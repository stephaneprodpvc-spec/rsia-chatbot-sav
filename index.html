async function envoyerAirtable(data) {
  const resp = await fetch('https://hook.eu1.make.com/y22f90neec245a6bhg5usmf3mnkcecg8', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!resp.ok) throw new Error('Erreur webhook');
  return true;
}

                  ["Problème", probleme?.label],
                  ["Créneau", creneau],
                ].map(([lbl,val],i) => (
                  <div key={i} style={{display:"flex",gap:"10px",padding:"7px 0",borderBottom:`1px solid ${F.grisBord}`}}>
                    <span style={{fontSize:"11px",fontWeight:"700",color:"#64748B",minWidth:"100px",flexShrink:0}}>{lbl}</span>
                    <span style={{fontSize:"12px",color:F.marine}}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
            <button onClick={confirmer} disabled={sending}
              style={{width:"100%",padding:"15px",background:sending?"#64748B":F.marine,color:F.blanc,border:`2px solid ${F.or}`,borderRadius:"10px",fontSize:"14px",fontWeight:"700",cursor:sending?"not-allowed":"pointer"}}>
              {sending ? "⏳ Envoi en cours..." : "✅ Confirmer et envoyer ma demande"}
            </button>
          </>
        )}

        {etape === "merci" && (
          <>
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{fontSize:"40px",marginBottom:"12px"}}>✅</div>
              <div style={{fontSize:"20px",fontWeight:"900",color:F.marine,marginBottom:"6px"}}>Demande envoyée !</div>
              <div style={{fontSize:"13px",color:"#64748B"}}>Votre demande SAV a bien été prise en compte.</div>
            </div>
            <div style={{background:F.marine,borderRadius:"12px",padding:"16px",textAlign:"center",border:`2px solid ${F.or}`}}>
              <div style={{color:F.orClair,fontSize:"11px",fontWeight:"600",marginBottom:"6px",letterSpacing:"2px"}}>VOTRE NUMÉRO DE TICKET</div>
              <div style={{color:F.or,fontSize:"28px",fontWeight:"900",letterSpacing:"2px",fontFamily:"monospace"}}>{ticket}</div>
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:"11px",marginTop:"6px"}}>Conservez ce numéro pour le suivi</div>
            </div>
            {envoi === 'ok' && (
              <div style={{background:F.vertClair,border:"1px solid #86EFAC",borderRadius:"9px",padding:"10px 14px",fontSize:"12px",color:F.vert,fontWeight:"600"}}>
                ✅ Ticket enregistré dans Airtable — notification envoyée à l'agence
              </div>
            )}
            {envoi === 'err' && (
              <div style={{background:F.rougeClair,border:"1px solid #FCA5A5",borderRadius:"9px",padding:"10px 14px",fontSize:"12px",color:F.rouge,fontWeight:"600"}}>
                ⚠️ Ticket créé — erreur d'envoi Airtable, veuillez contacter l'agence directement
              </div>
            )}
            <div style={{background:probleme?.urgent?F.rougeClair:F.vertClair,border:`1px solid ${probleme?.urgent?"#FCA5A5":"#86EFAC"}`,borderRadius:"10px",padding:"12px 16px"}}>
              <div style={{fontWeight:"700",fontSize:"13px",color:F.marine}}>
                {probleme?.urgent?"⚡ Intervention sous 24-48h":"🕐 Intervention sous 5-10 jours ouvrés"}
              </div>
              <div style={{fontSize:"12px",color:"#475569",marginTop:"2px"}}>Créneau : {creneau}</div>
            </div>
            <div style={{background:F.blanc,borderRadius:"12px",padding:"14px 16px",border:`1px solid ${F.grisBord}`}}>
              <div style={{fontSize:"12px",fontWeight:"700",color:F.marine,marginBottom:"10px",borderLeft:`3px solid ${F.or}`,paddingLeft:"8px"}}>
                📍 Votre agence RSIA — {agence?.ville}
              </div>
              <div style={{fontSize:"12px",color:"#475569",lineHeight:"2"}}>
                <div>Lun–Ven : 8h00–12h00 / 13h30–17h30</div>
                <div>sav@rsia-conseil.fr</div>
              </div>
            </div>
            <button onClick={reset}
              style={{width:"100%",padding:"13px",background:F.blanc,color:F.marine,border:`2px solid ${F.grisBord}`,borderRadius:"10px",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}>
              Faire une nouvelle demande SAV
            </button>
          </>
        )}

        <div ref={bottomRef} />
      </div>

      <div style={{background:F.marine,padding:"8px 16px",textAlign:"center"}}>
        <span style={{color:F.or,fontSize:"10px",opacity:0.8}}>© RSIA Conseil — Solutions IA pour les PME du bâtiment</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
