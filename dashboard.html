<!DOCTYPE html>

<style>

input:focus, select:focus, textarea:focus { border-color:rgba(255,107,0,0.5); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const AIRTABLE_TOKEN = 'patXNwO908NNfQcQZ.6d0f58479c753d1bb828a26eccbfc4b1e10ece70b8c71e381d304ecb62990375';
const AIRTABLE_BASE = 'appFqAT8WeX0UTudy';
const WEBHOOK = 'https://hook.eu1.make.com/bkoorc2nn457jgvmvtv6pjme5vrtz68g';

const PASSWORDS = {
  "rsia2026": "global",
  "ibos65": "Ibos (65)",
  "tarnos40": "Tarnos (40)",
  "lescar64": "Lescar (64)",
  "stgaudens31": "Saint-Gaudens (31)",
};

const AGENCES = ["Ibos (65)", "Tarnos (40)", "Lescar (64)", "Saint-Gaudens (31)"];

const PRODUITS = ["Fenêtre","Coulissant","Volet roulant","Portail","Porte de garage","Véranda","Autre"];

const PROBLEMES = {
  "Fenêtre": ["Fermeture difficile","Infiltration d'eau","Courant d'air / joint usé","Vitrage fissuré","Fenêtre bloquée ouverte","Autre"],
  "Coulissant": ["Rail bloqué","Infiltration d'eau","Serrure défaillante","Autre"],
  "Volet roulant": ["Volet bloqué","Moteur en panne","Lame cassée","Télécommande HS","Autre"],
  "Portail": ["Moteur en panne","Télécommande HS","Gond arraché","Fermeture défaillante","Autre"],
  "Porte de garage": ["Moteur en panne","Ressort cassé","Porte bloquée","Serrure défaillante","Autre"],
  "Véranda": ["Toiture — Fuite","Coulissant — Rail bloqué","Fenêtre — Fermeture difficile","Autre"],
  "Autre": ["Décrire le problème"],

const C = {
  bg: "#0D0D0D", card: "#161616", border: "#2a2a2a",
  or: "#FF6B00", orDim: "rgba(255,107,0,0.12)", orBord: "rgba(255,107,0,0.3)",
  text: "#E5E5E5", muted: "#666", white: "#fff",
  rouge: "#DC2626", rougeDim: "rgba(220,38,38,0.12)",
  vert: "#16a34a", vertDim: "rgba(22,163,74,0.12)",
  bleu: "#2563eb", bleuDim: "rgba(37,99,235,0.12)",
  jaune: "#d97706", jauneDim: "rgba(217,119,6,0.12)",
};

function Badge({ label, color, bg }) {
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:"20px",fontSize:"10px",fontWeight:"700",color,background:bg,letterSpacing:"0.5px"}}>{label}</span>;
}

function StatCard({ label, value, sub, accent }) {
  return (
    <div style={{background:C.card,border:"1px solid "+(accent?C.orBord:C.border),borderRadius:"12px",padding:"16px 20px",flex:1,minWidth:"120px"}}>
      <div style={{fontSize:"28px",fontWeight:"900",color:accent?C.or:C.white,fontFamily:"monospace"}}>{value}</div>
      <div style={{fontSize:"12px",fontWeight:"700",color:C.text,marginTop:"4px"}}>{label}</div>
      {sub && <div style={{fontSize:"10px",color:C.muted,marginTop:"2px"}}>{sub}</div>}
    </div>
  );
}

function TicketRow({ t, onStatusChange }) {
  const urgent = t.fields?.Urgent === true || t.fields?.Urgent === "true";
  const statut = t.fields?.Statut || "Nouveau";
  const statusColors = {
    "Nouveau": { color: C.bleu, bg: C.bleuDim },
    "En cours": { color: C.jaune, bg: C.jauneDim },
    "Terminé": { color: C.vert, bg: C.vertDim },
    "Annulé": { color: C.muted, bg: "#1a1a1a" },
  };
  const sc = statusColors[statut] || statusColors["Nouveau"];
  return (
    <div style={{background:C.card,border:"1px solid "+(urgent?"rgba(220,38,38,0.3)":C.border),borderRadius:"10px",padding:"12px 16px",display:"flex",gap:"12px",alignItems:"flex-start"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"6px"}}>
          <span style={{fontSize:"12px",fontWeight:"900",color:C.or,fontFamily:"monospace"}}>{t.fields?.Name||"—"}</span>
          {urgent && <Badge label="URGENT" color={C.rouge} bg={C.rougeDim}/>}
          <Badge label={statut} color={sc.color} bg={sc.bg}/>
          {t.fields?.["Source"] === "telephone" && <Badge label="📞 Tél." color={C.jaune} bg={C.jauneDim}/>}
          <span style={{fontSize:"10px",color:C.muted,marginLeft:"auto"}}>{t.fields?.Agence}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 16px"}}>
          {[["👤",t.fields?.Client],["📦",t.fields?.Produit],["🔧",t.fields?.Problème],["📅",t.fields?.Créneau],["📍",t.fields?.Adresse],["📞",t.fields?.Téléphone],["📎",t.fields?.Photos?"Photo(s) jointe(s)":null]].map(([icon,val],i) => val?(
            <div key={i} style={{fontSize:"11px",color:C.muted,display:"flex",gap:"5px",alignItems:"flex-start"}}>
              <span style={{flexShrink:0}}>{icon}</span>
              <span style={{color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{val}</span>
            </div>
          ):null)}
        </div>{t.fields?.Photos && (
  <a href={t.fields.Photos.split(',')[0].trim()} target="_blank" style={{fontSize:"11px",color:C.or,fontWeight:"700",textDecoration:"none",display:"flex",alignItems:"center",gap:"5px",marginTop:"6px"}}>
    📎 Voir la/les photo(s)
  </a>
      <button onclick="renvoyerMailTechnicien('${t.fields?.Name}')" style="margin-top:8px;background:#FF6B00;color:#111;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;width:100%">📧 Renvoyer au technicien</button>
)}
      </div>
      <div style={{flexShrink:0}}>
        <select value={statut} onChange={e => onStatusChange(t.id, e.target.value)}
          style={{background:"#1f1f1f",border:"1px solid "+C.border,color:C.text,borderRadius:"8px",padding:"5px 8px",fontSize:"11px",cursor:"pointer"}}>
          <option>Nouveau</option><option>En cours</option><option>Terminé</option><option>Annulé</option>
        </select>
      </div>
    </div>
  );
}

// ---- MODAL AJOUT RDV ----
function ModalRdv({ agenceAccess, onClose, onSuccess }) {
  const today = new Date().toISOString().split('T')[0];
  const [form, setForm] = React.useState({
    agence: agenceAccess !== "global" ? agenceAccess : AGENCES[0],
    nom: "", tel: "", email: "", adresse: "",
    produit: "Fenêtre", probleme: PROBLEMES["Fenêtre"][0],
    date: today, creneau: "Matin (8h30 — 12h00)",
    garantie: false, facture: "", notes: ""
  });
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState("");

  const set = (k, v) => setForm(prev => ({...prev, [k]: v}));

  const handleProduit = (p) => {
    set("produit", p);
    set("probleme", PROBLEMES[p]?.[0] || "Autre");
  };

  const sauvegarder = async () => {
    if (!form.nom.trim() || !form.tel.trim() || !form.date) {
      setError("Nom, téléphone et date sont obligatoires."); return;
    }
    setSaving(true); setError("");
    try {
      // 1. Générer numéro ticket
      const num = 'SAV-' + new Date().getFullYear() + '-' + (Math.floor(Math.random()*9000)+1000);

      // 2. Créer ticket Airtable
      await fetch('https://api.airtable.com/v0/' + AIRTABLE_BASE + '/Tickets SAV', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + AIRTABLE_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields: {
          Name: num,
          Agence: form.agence,
          Client: form.nom,
          Téléphone: form.tel,
          Email: form.email,
          Adresse: form.adresse,
          Produit: form.produit,
          Problème: form.probleme,
          Créneau: form.creneau + ' — ' + new Date(form.date + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long'}),
          Garantie: form.garantie,
          "N° Facture": form.facture,
          Source: "telephone",
        }})
      });

      // 3. Bloquer créneau Planning
      const dateLabel = form.creneau === "Matin (8h30 — 12h00)" ? "Matin (8h30 — 12h00)" : "Après-midi (13h00 — 17h00)";
      const filterPlanning = encodeURIComponent('AND({Agence}="'+form.agence+'",{Créneau}="'+dateLabel+'",{Date}="'+form.date+'",{Statut}="Libre")');
      const planningUrl = 'https://api.airtable.com/v0/' + AIRTABLE_BASE + '/Planning?filterByFormula=' + filterPlanning + '&maxRecords=1';
      const planResp = await fetch(planningUrl, { headers: { Authorization: 'Bearer ' + AIRTABLE_TOKEN } });
      const planJson = await planResp.json();
      if (planJson.records?.length > 0) {
        await fetch('https://api.airtable.com/v0/' + AIRTABLE_BASE + '/Planning/' + planJson.records[0].id, {
          method: 'PATCH',
          headers: { Authorization: 'Bearer ' + AIRTABLE_TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { Statut: 'Pris' } })
        });
      }

      // 4. Envoyer webhook Make (mail technicien + agence)
      await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ticket: num, agence: form.agence, nom: form.nom, tel: form.tel,
          "e-mail": form.email || "aucun@rsia.fr",
          adresse: form.adresse, produit: form.produit, probleme: form.probleme,
          creneau: dateLabel + ' — ' + new Date(form.date + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long'}),
          garantie: form.garantie, facture: form.facture, urgent: false, photos: '',
          source: 'telephone'
        })
      });

      onSuccess(num);
    } catch(e) {
      setError("Erreur lors de l'enregistrement. Vérifiez la connexion.");
    }
    setSaving(false);
  };

  const labelStyle = { fontSize:"11px", fontWeight:"700", color:C.muted, display:"block", marginBottom:"4px" };
  const groupStyle = { marginBottom:"14px" };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
          <div>
            <div style={{fontSize:"16px",fontWeight:"900",color:C.white}}>📞 Nouveau RDV téléphone</div>
            <div style={{fontSize:"11px",color:C.muted,marginTop:"2px"}}>Prise de rendez-vous manuelle</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"1px solid "+C.border,color:C.muted,borderRadius:"8px",width:"30px",height:"30px",cursor:"pointer",fontSize:"16px"}}>✕</button>
        </div>

        {/* Agence */}
        <div style={groupStyle}>
          <label style={labelStyle}>Agence *</label>
          <select value={form.agence} onChange={e => set("agence", e.target.value)} disabled={agenceAccess !== "global"}>
            {AGENCES.map(a => <option key={a}>{a}</option>)}
          </select>
        </div>

        {/* Client */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}}>
          <div>
            <label style={labelStyle}>Nom et prénom *</label>
            <input placeholder="Jean Dupont" value={form.nom} onChange={e => set("nom",e.target.value)}/>
          </div>
          <div>
            <label style={labelStyle}>Téléphone *</label>
            <input placeholder="06 12 34 56 78" value={form.tel} onChange={e => set("tel",e.target.value)}/>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}}>
          <div>
            <label style={labelStyle}>Email</label>
            <input placeholder="jean@gmail.com" value={form.email} onChange={e => set("email",e.target.value)}/>
          </div>
          <div>
            <label style={labelStyle}>Adresse</label>
            <input placeholder="12 rue des Lilas, 65000" value={form.adresse} onChange={e => set("adresse",e.target.value)}/>
          </div>
        </div>

        {/* Produit / Problème */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}}>
          <div>
            <label style={labelStyle}>Produit *</label>
            <select value={form.produit} onChange={e => handleProduit(e.target.value)}>
              {PRODUITS.map(p => <option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={labelStyle}>Problème *</label>
            <select value={form.probleme} onChange={e => set("probleme",e.target.value)}>
              {(PROBLEMES[form.produit]||["Autre"]).map(p => <option key={p}>{p}</option>)}
            </select>
          </div>
        </div>

        {/* Date / Créneau */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}}>
          <div>
            <label style={labelStyle}>Date d'intervention *</label>
            <input type="date" value={form.date} min={today} onChange={e => set("date",e.target.value)}/>
          </div>
          <div>
            <label style={labelStyle}>Créneau *</label>
            <select value={form.creneau} onChange={e => set("creneau",e.target.value)}>
              <option value="Matin (8h30 — 12h00)">🌅 Matin (8h30 — 12h00)</option>
              <option value="Après-midi (13h00 — 17h00)">🌇 Après-midi (13h00 — 17h00)</option>
            </select>
          </div>
        </div>

        {/* Garantie */}
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px",background:"#1a1a1a",borderRadius:"8px",padding:"10px 14px"}}>
          <input type="checkbox" id="garantie" checked={form.garantie} onChange={e => set("garantie",e.target.checked)} style={{width:"16px",cursor:"pointer"}}/>
          <label htmlFor="garantie" style={{fontSize:"12px",color:C.text,cursor:"pointer"}}>Produit sous garantie</label>
          {form.garantie && (
            <input placeholder="N° facture" value={form.facture} onChange={e => set("facture",e.target.value)} style={{flex:1,marginLeft:"8px"}}/>
          )}
        </div>

        {error && <div style={{background:C.rougeDim,border:"1px solid rgba(220,38,38,0.3)",borderRadius:"8px",padding:"8px 12px",fontSize:"11px",color:C.rouge,marginBottom:"14px"}}>{error}</div>}

        <div style={{display:"flex",gap:"10px"}}>
          <button onClick={onClose} style={{flex:1,padding:"11px",background:"transparent",color:C.muted,border:"1px solid "+C.border,borderRadius:"10px",fontSize:"12px",cursor:"pointer"}}>
            Annuler
          </button>
          <button onClick={sauvegarder} disabled={saving}
            style={{flex:2,padding:"11px",background:saving?"#333":C.or,color:saving?C.muted:"#111",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:"900",cursor:saving?"not-allowed":"pointer"}}>
            {saving ? "⏳ Enregistrement..." : "✅ Confirmer le RDV"}
          </button>
        </div>
      </div>
    </div>
  );
}

function ModalSuccess({ ticket, onClose }) {
  return (
    <div className="modal-overlay">
      <div className="modal-box" style={{textAlign:"center",maxWidth:"360px"}}>
        <div style={{fontSize:"48px",marginBottom:"16px"}}>✅</div>
        <div style={{fontSize:"18px",fontWeight:"900",color:C.white,marginBottom:"8px"}}>RDV enregistré !</div>
        <div style={{background:C.card,border:"1px solid "+C.orBord,borderRadius:"12px",padding:"16px",margin:"16px 0"}}>
          <div style={{fontSize:"10px",color:C.muted,marginBottom:"6px",letterSpacing:"2px"}}>NUMÉRO DE TICKET</div>
          <div style={{fontSize:"22px",fontWeight:"900",color:C.or,fontFamily:"monospace"}}>{ticket}</div>
        </div>
        <div style={{fontSize:"11px",color:C.muted,marginBottom:"20px"}}>Créneau bloqué · Notification agence envoyée</div>
        <button onClick={onClose} style={{width:"100%",padding:"11px",background:C.or,color:"#111",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:"900",cursor:"pointer"}}>
          Fermer
        </button>
      </div>
    </div>
  );
}

function PlanningView({ agenceFilter }) {
  const [slots, setSlots] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  const charger = async () => {
    setLoading(true);
    try {
      let filter = agenceFilter !== "global"
        ? encodeURIComponent('AND({Agence}="'+agenceFilter+'",{Statut}="Pris")')
        : encodeURIComponent('{Statut}="Pris"');
      const url = 'https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Planning?filterByFormula='+filter+'&sort[0][field]=Date&sort[0][direction]=asc&maxRecords=50';
      const r = await fetch(url, { headers: { Authorization: 'Bearer '+AIRTABLE_TOKEN } });
      const json = await r.json();
      setSlots(json.records||[]);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  React.useEffect(() => { charger(); }, [agenceFilter]);

  const byDate = {};
  slots.forEach(s => {
    const d = s.fields?.Date;
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(s);
  });
  const today = new Date().toISOString().split('T')[0];

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <h2 style={{fontSize:"16px",fontWeight:"700",color:C.white}}>📅 Planning interventions</h2>
        <button onClick={charger} style={{background:C.orDim,border:"1px solid "+C.orBord,color:C.or,borderRadius:"8px",padding:"5px 12px",fontSize:"11px",cursor:"pointer"}}>↺ Rafraîchir</button>
      </div>
      {loading && <div style={{textAlign:"center",padding:"40px",color:C.muted}}>Chargement...</div>}
      {!loading && Object.keys(byDate).length === 0 && (
        <div style={{textAlign:"center",padding:"40px",color:C.muted,border:"1px dashed "+C.border,borderRadius:"12px"}}>Aucune intervention planifiée</div>
      )}
      {!loading && Object.keys(byDate).sort().map(date => {
        const dateObj = new Date(date+'T12:00:00');
        const label = dateObj.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
        const isPast = date < today;
        const isToday = date === today;
        return (
          <div key={date} style={{marginBottom:"16px",opacity:isPast?0.5:1}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
              <div style={{height:"1px",flex:1,background:C.border}}/>
              <span style={{fontSize:"12px",fontWeight:"700",color:isToday?C.or:C.muted,textTransform:"capitalize",whiteSpace:"nowrap"}}>
                {isToday?"⚡ Aujourd'hui — ":""}{label}
              </span>
              <div style={{height:"1px",flex:1,background:C.border}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
              {byDate[date].map((s,i) => (
                <div key={i} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"8px",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:"12px",fontWeight:"700",color:C.white}}>{s.fields?.Créneau?.replace("Matin (8h30 — 12h00)","🌅 Matin").replace("Après-midi (13h00 — 17h00)","🌇 Après-midi")}</span>
                    <span style={{fontSize:"10px",color:C.muted,marginLeft:"10px"}}>{s.fields?.Agence}</span>
                  </div>
                  <button onClick={async () => {
                    await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Planning/'+s.id, {
                      method:'PATCH', headers:{Authorization:'Bearer '+AIRTABLE_TOKEN,'Content-Type':'application/json'},
                      body:JSON.stringify({fields:{Statut:'Libre'}})
                    }); charger();
                  }} style={{background:"rgba(220,38,38,0.1)",border:"1px solid rgba(220,38,38,0.3)",color:C.rouge,borderRadius:"6px",padding:"3px 8px",fontSize:"10px",cursor:"pointer"}}>
                    Libérer
                  </button>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Dashboard({ agenceAccess }) {
  const [tickets, setTickets] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [agenceFilter, setAgenceFilter] = React.useState(agenceAccess === "global" ? "global" : agenceAccess);
  const [vue, setVue] = React.useState("tickets");
  const [search, setSearch] = React.useState("");
  const [statutFilter, setStatutFilter] = React.useState("tous");
  const [lastRefresh, setLastRefresh] = React.useState(null);
  const [showModalRdv, setShowModalRdv] = React.useState(false);
  const [successTicket, setSuccessTicket] = React.useState(null);

  const charger = async () => {
    setLoading(true);
    try {
      let filter = agenceFilter !== "global" ? encodeURIComponent('{Agence}="'+agenceFilter+'"') : "";
      const url = 'https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Tickets SAV?'+(filter?'filterByFormula='+filter+'&':'')+'sort[0][field]=Name&sort[0][direction]=desc&maxRecords=200';
      const r = await fetch(url, { headers: { Authorization: 'Bearer '+AIRTABLE_TOKEN } });
      const json = await r.json();
      setTickets(json.records||[]);
      setLastRefresh(new Date().toLocaleTimeString('fr-FR'));
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  React.useEffect(() => { charger(); }, [agenceFilter]);

  const renvoyerMailTechnicien = (ticketId) => {
  if (!confirm('Renvoyer le mail au technicien pour le ticket ' + ticketId + ' ?')) return;
  fetch('https://hook.eu1.make.com/8idy6ft9mhf2nkr6janhjmvtjfvj6c7f?ticketId=' + encodeURIComponent(ticketId))
    .then(() => alert('✅ Mail renvoyé au technicien !'))
    .catch(() => alert('❌ Erreur lors de l\'envoi'));
};
  const updateStatus = async (id, newStatus) => {
    setTickets(prev => prev.map(t => t.id===id?{...t,fields:{...t.fields,Statut:newStatus}}:t));
    await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Tickets SAV/'+id, {
      method:'PATCH', headers:{Authorization:'Bearer '+AIRTABLE_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({fields:{Statut:newStatus}})
    });
  };

  const filtered = tickets.filter(t => {
    const matchAgence = agenceFilter==="global" || t.fields?.Agence===agenceFilter;
    const matchStatut = statutFilter==="tous" || t.fields?.Statut===statutFilter || (!t.fields?.Statut&&statutFilter==="Nouveau");
    const q = search.toLowerCase();
    const matchSearch = !q || (t.fields?.Client||"").toLowerCase().includes(q) || (t.fields?.Name||"").toLowerCase().includes(q) || (t.fields?.Produit||"").toLowerCase().includes(q);
    return matchAgence && matchStatut && matchSearch;
  });

  const stats = {
    total: tickets.length,
    urgent: tickets.filter(t => t.fields?.Urgent===true||t.fields?.Urgent==="true").length,
    nouveau: tickets.filter(t => !t.fields?.Statut||t.fields?.Statut==="Nouveau").length,
    encours: tickets.filter(t => t.fields?.Statut==="En cours").length,
    termine: tickets.filter(t => t.fields?.Statut==="Terminé").length,
  };

  const byAgence = {};
  AGENCES.forEach(a => { byAgence[a] = tickets.filter(t => t.fields?.Agence===a).length; });

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {showModalRdv && (
        <ModalRdv
          agenceAccess={agenceFilter !== "global" ? agenceFilter : agenceAccess}
          onClose={() => setShowModalRdv(false)}
          onSuccess={(num) => { setShowModalRdv(false); setSuccessTicket(num); charger(); }}
        />
      )}
      {successTicket && <ModalSuccess ticket={successTicket} onClose={() => setSuccessTicket(null)} />}

      {/* Header */}
      <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          <div style={{width:"36px",height:"36px",background:C.or,borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontFamily:"Arial Black",fontSize:"18px",fontWeight:"900",color:"#111",transform:"scaleX(-1)",display:"inline-block"}}>R</span>
          </div>
          <div>
            <div style={{fontSize:"15px",fontWeight:"900",color:C.white}}>
              <span style={{display:"inline-block",transform:"scaleX(-1)",fontFamily:"Arial Black"}}>R</span>S<span style={{color:C.or}}>IA</span>
              <span style={{fontSize:"11px",fontWeight:"500",marginLeft:"6px",color:C.muted}}>Dashboard SAV</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          {lastRefresh && <span style={{fontSize:"10px",color:C.muted}}>MAJ {lastRefresh}</span>}
          <button onClick={() => setShowModalRdv(true)}
            style={{background:C.or,border:"none",color:"#111",borderRadius:"8px",padding:"8px 16px",fontSize:"12px",fontWeight:"900",cursor:"pointer",display:"flex",alignItems:"center",gap:"6px"}}>
            📞 + Nouveau RDV
          </button>
          <button onClick={charger} style={{background:C.orDim,border:"1px solid "+C.orBord,color:C.or,borderRadius:"8px",padding:"6px 14px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>↺</button>
        </div>
      </div>

      <div style={{padding:"24px",maxWidth:"1200px",margin:"0 auto"}}>

        {agenceAccess === "global" && (
          <div style={{display:"flex",gap:"8px",marginBottom:"20px",flexWrap:"wrap"}}>
            {["global",...AGENCES].map(a => (
              <button key={a} onClick={() => setAgenceFilter(a)}
                style={{padding:"7px 16px",borderRadius:"20px",border:"1px solid "+(agenceFilter===a?C.or:C.border),background:agenceFilter===a?C.or:"transparent",color:agenceFilter===a?"#111":C.muted,fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>
                {a==="global"?"🌐 Toutes agences":a}
              </button>
            ))}
          </div>
        )}

        <div style={{display:"flex",gap:"12px",marginBottom:"20px",flexWrap:"wrap"}}>
          <StatCard label="Total tickets" value={stats.total} accent/>
          <StatCard label="Urgents" value={stats.urgent} sub="à traiter en priorité"/>
          <StatCard label="Nouveaux" value={stats.nouveau}/>
          <StatCard label="En cours" value={stats.encours}/>
          <StatCard label="Terminés" value={stats.termine}/>
        </div>

        {agenceFilter === "global" && (
          <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"12px",padding:"16px 20px",marginBottom:"20px"}}>
            <div style={{fontSize:"13px",fontWeight:"700",color:C.white,marginBottom:"12px"}}>Répartition par agence</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px"}}>
              {AGENCES.map(a => (
                <button key={a} onClick={() => setAgenceFilter(a)}
                  style={{background:"#1a1a1a",border:"1px solid "+C.border,borderRadius:"10px",padding:"12px",textAlign:"center",cursor:"pointer"}}>
                  <div style={{fontSize:"22px",fontWeight:"900",color:C.or,fontFamily:"monospace"}}>{byAgence[a]}</div>
                  <div style={{fontSize:"11px",color:C.muted,marginTop:"4px"}}>{a}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        <div style={{display:"flex",gap:"4px",marginBottom:"16px",background:C.card,borderRadius:"10px",padding:"4px",border:"1px solid "+C.border,width:"fit-content"}}>
          {[["tickets","🎫 Tickets"],["planning","📅 Planning"]].map(([v,l]) => (
            <button key={v} onClick={() => setVue(v)}
              style={{padding:"7px 18px",borderRadius:"7px",border:"none",background:vue===v?C.or:"transparent",color:vue===v?"#111":C.muted,fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>

        {vue === "tickets" && (
          <>
            <div style={{display:"flex",gap:"10px",marginBottom:"16px",flexWrap:"wrap",alignItems:"center"}}>
              <input placeholder="🔍 Rechercher client, ticket, produit..." value={search} onChange={e => setSearch(e.target.value)}
                style={{width:"280px"}}/>
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                {["tous","Nouveau","En cours","Terminé","Annulé"].map(s => (
                  <button key={s} onClick={() => setStatutFilter(s)}
                    style={{padding:"6px 12px",borderRadius:"20px",border:"1px solid "+(statutFilter===s?C.or:C.border),background:statutFilter===s?C.orDim:"transparent",color:statutFilter===s?C.or:C.muted,fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>
                    {s==="tous"?"Tous":s}
                  </button>
                ))}
              </div>
              <span style={{fontSize:"11px",color:C.muted,marginLeft:"auto"}}>{filtered.length} ticket{filtered.length>1?"s":""}</span>
            </div>
            {loading && <div style={{textAlign:"center",padding:"60px",color:C.muted}}>Chargement...</div>}
            {!loading && filtered.length===0 && (
              <div style={{textAlign:"center",padding:"60px",color:C.muted,border:"1px dashed "+C.border,borderRadius:"12px"}}>Aucun ticket trouvé</div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {filtered.map(t => <TicketRow key={t.id} t={t} onStatusChange={updateStatus}/>)}
            </div>
          </>
        )}

        {vue === "planning" && <PlanningView agenceFilter={agenceFilter}/>}
      </div>
    </div>
  );
}

function Login({ onLogin }) {
  const [pwd, setPwd] = React.useState("");
  const [error, setError] = React.useState(false);
  const [show, setShow] = React.useState(false);
  const tenter = () => {
    const access = PASSWORDS[pwd.trim()];
    if (access) { onLogin(access); }
    else { setError(true); setTimeout(() => setError(false), 2000); }
  };
  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{width:"100%",maxWidth:"380px"}}>
        <div style={{textAlign:"center",marginBottom:"40px"}}>
          <div style={{width:"60px",height:"60px",background:C.or,borderRadius:"14px",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <span style={{fontFamily:"Arial Black",fontSize:"30px",fontWeight:"900",color:"#111",transform:"scaleX(-1)",display:"inline-block"}}>R</span>
          </div>
          <div style={{fontSize:"24px",fontWeight:"900",color:C.white}}>
            <span style={{display:"inline-block",transform:"scaleX(-1)",fontFamily:"Arial Black"}}>R</span>S<span style={{color:C.or}}>IA</span> Conseil
          </div>
          <div style={{fontSize:"12px",color:C.muted,marginTop:"6px",letterSpacing:"2px",textTransform:"uppercase"}}>Dashboard SAV</div>
        </div>
        <div style={{background:C.card,border:"1px solid "+(error?"rgba(220,38,38,0.4)":C.orBord),borderRadius:"16px",padding:"28px"}}>
          <div style={{fontSize:"13px",fontWeight:"700",color:C.white,marginBottom:"16px"}}>Accès sécurisé</div>
          <div style={{position:"relative",marginBottom:"16px"}}>
            <input type={show?"text":"password"} placeholder="Mot de passe agence" value={pwd}
              onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key==="Enter"&&tenter()}/>
            <button onClick={() => setShow(!show)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"14px",width:"auto"}}>
              {show?"🙈":"👁️"}
            </button>
          </div>
          {error && <div style={{fontSize:"11px",color:C.rouge,marginBottom:"12px",textAlign:"center"}}>Mot de passe incorrect</div>}
          <button onClick={tenter} style={{width:"100%",padding:"12px",background:C.or,color:"#111",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:"900",cursor:"pointer"}}>
            Accéder →
          </button>
          <div style={{marginTop:"20px",borderTop:"1px solid "+C.border,paddingTop:"16px"}}>
            <div style={{fontSize:"10px",color:C.muted,marginBottom:"8px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px"}}>Accès disponibles</div>
            {[["rsia2026","Toutes agences"],["ibos65","Ibos"],["tarnos40","Tarnos"],["lescar64","Lescar"],["stgaudens31","Saint-Gaudens"]].map(([p,l]) => (
              <div key={p} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+C.border}}>
                <span style={{fontSize:"11px",color:C.muted}}>{l}</span>
                <code style={{fontSize:"11px",color:C.or,background:C.orDim,padding:"1px 6px",borderRadius:"4px"}}>{p}</code>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [access, setAccess] = React.useState(null);
  return access ? <Dashboard agenceAccess={access}/> : <Login onLogin={setAccess}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
