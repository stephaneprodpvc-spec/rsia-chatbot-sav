// ---- TRI PAR DATE ----
const MOIS = {janvier:1,février:2,mars:3,avril:4,mai:5,juin:6,juillet:7,août:8,septembre:9,octobre:10,novembre:11,décembre:12};
const parseDateCreneau = (creneau) => {
  if (!creneau) return new Date(9999,0,1);
  const match = creneau.match(/(\d+)\s+(\w+)(?:\s+(\d{4}))?/g);
  if (!match) return new Date(9999,0,1);
  const last = match[match.length-1];
  const parts = last.match(/(\d+)\s+(\w+)(?:\s+(\d{4}))?/);
  if (!parts) return new Date(9999,0,1);
  const day = parseInt(parts[1]);
  const month = MOIS[parts[2].toLowerCase()] || 1;
  const year = parts[3] ? parseInt(parts[3]) : new Date().getFullYear();
  return new Date(year, month-1, day);
};

function ModalRdv({ agenceAccess, onClose, onSuccess }) {
  const today = new Date().toISOString().split('T')[0];

  const [error, setError] = React.useState("");

  const set = (k, v) => setForm(prev => ({...prev, [k]: v}));

  const handleProduit = (p) => {
    set("produit", p);
    set("probleme", PROBLEMES[p]?.[0] || "Autre");

  const sauvegarder = async () => {
    if (!form.nom.trim() || !form.tel.trim() || !form.date) {
      setError("Nom, téléphone et date sont obligatoires."); return;
    }
    setSaving(true); setError("");
    try {
      const num = 'SAV-' + new Date().getFullYear() + '-' + (Math.floor(Math.random()*9000)+1000);
      await fetch('https://api.airtable.com/v0/' + AIRTABLE_BASE + '/Tickets SAV', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + AIRTABLE_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields: {
          Name: num, Agence: form.agence, Client: form.nom, Téléphone: form.tel,
          Email: form.email, Adresse: form.adresse, Produit: form.produit, Problème: form.probleme,
          Créneau: form.creneau + ' — ' + new Date(form.date + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long'}),
          Garantie: form.garantie, "N° Facture": form.facture, Source: "telephone",
        }})
      });
      const dateLabel = form.creneau === "Matin (8h30 — 12h00)" ? "Matin (8h30 — 12h00)" : "Après-midi (13h00 — 17h00)";
      const filterPlanning = encodeURIComponent('AND({Agence}="'+form.agence+'",{Créneau}="'+dateLabel+'",{Date}="'+form.date+'",{Statut}="Libre")');
      const planResp = await fetch('https://api.airtable.com/v0/' + AIRTABLE_BASE + '/Planning?filterByFormula=' + filterPlanning + '&maxRecords=1', { headers: { Authorization: 'Bearer ' + AIRTABLE_TOKEN } });
      const planJson = await planResp.json();
      if (planJson.records?.length > 0) {
        await fetch('https://api.airtable.com/v0/' + AIRTABLE_BASE + '/Planning/' + planJson.records[0].id, {
          method: 'PATCH',
          headers: { Authorization: 'Bearer ' + AIRTABLE_TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { Statut: 'Pris' } })
        });
      }
      await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ticket: num, agence: form.agence, nom: form.nom, tel: form.tel,
          "e-mail": form.email || "aucun@rsia.fr",
          adresse: form.adresse, produit: form.produit, probleme: form.probleme,
          creneau: dateLabel + ' — ' + new Date(form.date + 'T12:00:00').toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long'}),

      });
      onSuccess(num);
    } catch(e) {
      setError("Erreur lors de l'enregistrement. Vérifiez la connexion.");
    }
    setSaving(false);
  };

  const labelStyle = { fontSize:"11px", fontWeight:"700", color:C.muted, display:"block", marginBottom:"4px" };

function PlanningView({ agenceFilter }) {
  const [slots, setSlots] = React.useState([]);
  const [ticketsByPlanning, setTicketsByPlanning] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  const charger = async () => {
    setLoading(true);
    try {
      let filter = agenceFilter !== "global"
        ? encodeURIComponent('AND({Agence}="'+agenceFilter+'",{Statut}="Pris")')
        : encodeURIComponent('{Statut}="Pris"');
      const r = await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Planning?filterByFormula='+filter+'&sort[0][field]=Date&sort[0][direction]=asc&maxRecords=50', { headers: { Authorization: 'Bearer '+AIRTABLE_TOKEN } });
      const json = await r.json();
      const slotsData = json.records||[];
      setSlots(slotsData);

      // Charger les tickets SAV liés à un créneau (champ PlanningID = ID du record Planning)
      const filterTickets = encodeURIComponent('NOT({PlanningID}="")');
      const rt = await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Tickets SAV?filterByFormula='+filterTickets+'&maxRecords=300', { headers: { Authorization: 'Bearer '+AIRTABLE_TOKEN } });
      const jt = await rt.json();
      const map = {};
      (jt.records||[]).forEach(t => {
        if (t.fields?.PlanningID) map[t.fields.PlanningID] = t.fields;
      });
      setTicketsByPlanning(map);
    } catch(e) { console.error(e); }
    setLoading(false);
  };
  React.useEffect(() => { charger(); }, [agenceFilter]);
  const byDate = {};
  slots.forEach(s => { const d = s.fields?.Date; if (!byDate[d]) byDate[d] = []; byDate[d].push(s); });
  const today = new Date().toISOString().split('T')[0];
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <h2 style={{fontSize:"16px",fontWeight:"700",color:C.white}}>📅 Planning interventions</h2>
        <button onClick={charger} style={{background:C.orDim,border:"1px solid "+C.orBord,color:C.or,borderRadius:"8px",padding:"5px 12px",fontSize:"11px",cursor:"pointer"}}>↺ Rafraîchir</button>
      </div>
      {loading && <div style={{textAlign:"center",padding:"40px",color:C.muted}}>Chargement...</div>}
      {!loading && Object.keys(byDate).length === 0 && (
        <div style={{textAlign:"center",padding:"40px",color:C.muted,border:"1px dashed "+C.border,borderRadius:"12px"}}>Aucune intervention planifiée</div>
      )}
      {!loading && Object.keys(byDate).sort().map(date => {
        const dateObj = new Date(date+'T12:00:00');
        const label = dateObj.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
        const isPast = date < today;
        const isToday = date === today;
        return (
          <div key={date} style={{marginBottom:"16px",opacity:isPast?0.5:1}}>
            <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
              <div style={{height:"1px",flex:1,background:C.border}}/>
              <span style={{fontSize:"12px",fontWeight:"700",color:isToday?C.or:C.muted,textTransform:"capitalize",whiteSpace:"nowrap"}}>{isToday?"⚡ Aujourd'hui — ":""}{label}</span>
              <div style={{height:"1px",flex:1,background:C.border}}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
              {byDate[date].map((s,i) => {
                const ticket = ticketsByPlanning[s.id];
                return (
                <div key={i} style={{background:C.card,border:"1px solid "+C.border,borderRadius:"8px",padding:"10px 14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <span style={{fontSize:"12px",fontWeight:"700",color:C.white}}>{s.fields?.Créneau?.replace("Matin (8h30 — 12h00)","🌅 Matin").replace("Après-midi (13h00 — 17h00)","🌇 Après-midi")}</span>
                      <span style={{fontSize:"10px",color:C.muted,marginLeft:"10px"}}>{s.fields?.Agence}</span>
                    </div>
                    <button onClick={async () => {
                      await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Planning/'+s.id, {
                        method:'PATCH', headers:{Authorization:'Bearer '+AIRTABLE_TOKEN,'Content-Type':'application/json'},
                        body:JSON.stringify({fields:{Statut:'Libre'}})
                      }); charger();
                    }} style={{background:"rgba(220,38,38,0.1)",border:"1px solid rgba(220,38,38,0.3)",color:C.rouge,borderRadius:"6px",padding:"3px 8px",fontSize:"10px",cursor:"pointer"}}>
                      Libérer
                    </button>
                  </div>
                  {ticket ? (
                    <div style={{marginTop:"8px",paddingTop:"8px",borderTop:"1px solid "+C.border,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 14px"}}>
                      <div style={{fontSize:"11px",color:C.muted,display:"flex",gap:"5px"}}><span>👤</span><span style={{color:C.text}}>{ticket.Client||"—"}</span></div>
                      <div style={{fontSize:"11px",color:C.muted,display:"flex",gap:"5px"}}><span>📦</span><span style={{color:C.text}}>{ticket.Produit||"—"}</span></div>
                      <div style={{fontSize:"11px",color:C.muted,display:"flex",gap:"5px",gridColumn:"1 / -1"}}><span>🔧</span><span style={{color:C.text}}>{ticket.Problème||"—"}</span></div>
                      {ticket.Name && <div style={{fontSize:"10px",color:C.or,fontFamily:"monospace",gridColumn:"1 / -1",marginTop:"2px"}}>{ticket.Name}</div>}
                    </div>
                  ) : (
                    <div style={{marginTop:"6px",fontSize:"10px",color:C.muted,fontStyle:"italic"}}>Aucun ticket lié à ce créneau</div>
                  )}
                </div>
              );})}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Dashboard({ agenceAccess, onClose }) {
  const [tickets, setTickets] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [agenceFilter, setAgenceFilter] = React.useState(agenceAccess === "global" ? "global" : agenceAccess);
  const [vue, setVue] = React.useState("tickets");
  const [search, setSearch] = React.useState("");
  const [statutFilter, setStatutFilter] = React.useState("tous");
  const [sortBy, setSortBy] = React.useState("date");
  const [lastRefresh, setLastRefresh] = React.useState(null);
  const [showModalRdv, setShowModalRdv] = React.useState(false);
  const [successTicket, setSuccessTicket] = React.useState(null);
  const [modalAnnulation, setModalAnnulation] = React.useState(null);
  const [exportDebut, setExportDebut] = React.useState("");
  const [exportFin, setExportFin] = React.useState("");
  const [notifs, setNotifs] = React.useState([]);
  const idsConnusRef = React.useRef(null);
  const audioCtxRef = React.useRef(null);
  const isFetchingRef = React.useRef(false);

  const jouerSon = () => {
    try {
      if (!audioCtxRef.current) {
        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      }
      const ctx = audioCtxRef.current;
      if (ctx.state === 'suspended') ctx.resume();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(740, ctx.currentTime);
      o.frequency.setValueAtTime(988, ctx.currentTime + 0.12);
      g.gain.setValueAtTime(0.001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.start(); o.stop(ctx.currentTime + 0.5);
      o.onended = () => { o.disconnect(); g.disconnect(); };
    } catch(e) {}
  };

  const charger = async () => {
    if (isFetchingRef.current) return;
    isFetchingRef.current = true;
    setLoading(true);
    try {
      let filter = agenceFilter !== "global" ? encodeURIComponent('{Agence}="'+agenceFilter+'"') : "";
      const url = 'https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Tickets SAV?'+(filter?'filterByFormula='+filter+'&':'')+'sort[0][field]=Name&sort[0][direction]=desc&maxRecords=200';
      const r = await fetch(url, { headers: { Authorization: 'Bearer '+AIRTABLE_TOKEN } });
      const json = await r.json();
      const records = json.records||[];

      const idsActuels = new Set(records.map(t => t.id));
      if (idsConnusRef.current) {
        const nouveaux = records.filter(t => !idsConnusRef.current.has(t.id));
        if (nouveaux.length > 0) {
          jouerSon();
          const toasts = nouveaux.map(t => ({
            id: t.id + '-' + Date.now(),
            texte: '🆕 ' + (t.fields?.Name||'Nouveau ticket') + ' — ' + (t.fields?.Client||'Client inconnu') + ' (' + (t.fields?.Agence||'') + ')'
          }));
          setNotifs(prev => [...prev, ...toasts]);
          toasts.forEach(t => setTimeout(() => setNotifs(prev => prev.filter(n => n.id !== t.id)), 7000));
        }
      }
      idsConnusRef.current = idsActuels;

      setTickets(records);
      setLastRefresh(new Date().toLocaleTimeString('fr-FR'));
    } catch(e) { console.error(e); }
    setLoading(false);
    isFetchingRef.current = false;
  };

  React.useEffect(() => { charger(); }, [agenceFilter]);
  React.useEffect(() => {
    const interval = setInterval(() => { charger(); }, 30000);
    return () => clearInterval(interval);
  }, [agenceFilter]);

  const renvoyerMailTechnicien = (ticketId) => {
    if (!confirm('Renvoyer le mail au technicien pour le ticket ' + ticketId + ' ?')) return;
    fetch(WEBHOOK_TECHNICIEN + '?ticketId=' + encodeURIComponent(ticketId))
      .then(() => alert('✅ Mail renvoyé au technicien !'))
      .catch(() => alert('❌ Erreur lors de l\'envoi'));
  };

  const renvoyerMailClient = (ticketId) => {
    if (!confirm('Renvoyer le mail de confirmation au client pour le ticket ' + ticketId + ' ?')) return;
    fetch(WEBHOOK_CLIENT + '?ticketId=' + encodeURIComponent(ticketId))
      .then(() => alert('✅ Mail renvoyé au client !'))
      .catch(() => alert('❌ Erreur lors de l\'envoi'));
  };

  // Jeu de données pour l'export : respecte agence + statut + recherche + plage de dates
  const getExportData = () => {
    return tickets.filter(t => {
      const matchAgence = agenceFilter==="global" || t.fields?.Agence===agenceFilter;
      const matchStatut = statutFilter==="tous" || t.fields?.Statut===statutFilter || (!t.fields?.Statut&&statutFilter==="Nouveau");
      const q = search.toLowerCase();
      const matchSearch = !q || (t.fields?.Client||"").toLowerCase().includes(q) || (t.fields?.Name||"").toLowerCase().includes(q) || (t.fields?.Produit||"").toLowerCase().includes(q);
      const dateTicket = parseDateCreneau(t.fields?.Créneau);
      const matchDebut = !exportDebut || dateTicket >= new Date(exportDebut+'T00:00:00');
      const matchFin = !exportFin || dateTicket <= new Date(exportFin+'T23:59:59');
      return matchAgence && matchStatut && matchSearch && matchDebut && matchFin;
    }).sort((a,b) => parseDateCreneau(a.fields?.Créneau) - parseDateCreneau(b.fields?.Créneau));
  };

  const nomFichierExport = (ext) => {
    const ag = agenceFilter==="global" ? "Toutes-agences" : agenceFilter.replace(/[^\w]+/g,"-");
    const periode = (exportDebut||exportFin) ? (exportDebut||"...")+"_"+(exportFin||"...") : "complet";
    return "RSIA_Export_"+ag+"_"+periode+"."+ext;
  };

  const exportExcel = () => {
    const data = getExportData();
    if (data.length === 0) { alert("Aucun ticket ne correspond aux filtres sélectionnés."); return; }
    const rows = data.map(t => ({
      "N° Ticket": t.fields?.Name || "",
      "Date intervention": t.fields?.Créneau || "",
      "Statut": t.fields?.Statut || "Nouveau",
      "Urgent": (t.fields?.Urgent===true||t.fields?.Urgent==="true") ? "Oui" : "Non",
      "Agence": t.fields?.Agence || "",
      "Client": t.fields?.Client || "",
      "Téléphone": t.fields?.Téléphone || "",
      "Email": t.fields?.Email || "",
      "Adresse": t.fields?.Adresse || "",
      "Produit": t.fields?.Produit || "",
      "Problème": t.fields?.Problème || "",
      "Garantie": t.fields?.Garantie ? "Oui" : "Non",
      "N° Facture": t.fields?.["N° Facture"] || "",
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = Object.keys(rows[0]).map(k => ({ wch: Math.max(k.length, 14) }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Tickets SAV");
    XLSX.writeFile(wb, nomFichierExport("xlsx"));
  };

  const exportPDF = () => {
    const data = getExportData();
    if (data.length === 0) { alert("Aucun ticket ne correspond aux filtres sélectionnés."); return; }
    const ag = agenceFilter==="global" ? "Toutes agences" : agenceFilter;
    const periode = (exportDebut||exportFin) ? "Du "+(exportDebut||"...")+" au "+(exportFin||"...") : "Toutes dates";
    const lignes = data.map(t => `
      <tr>
        <td>${t.fields?.Name||""}</td>
        <td>${t.fields?.Créneau||""}</td>
        <td>${t.fields?.Statut||"Nouveau"}</td>
        <td>${t.fields?.Agence||""}</td>
        <td>${t.fields?.Client||""}</td>
        <td>${t.fields?.Téléphone||""}</td>
        <td>${t.fields?.Produit||""}</td>
        <td>${t.fields?.Problème||""}</td>
      </tr>`).join("");
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Export RSIA SAV</title>
      <style>
        body{font-family:Arial,sans-serif;padding:24px;color:#111;}
        h1{color:#111;font-size:18px;margin-bottom:2px;}
        .sub{color:#666;font-size:11px;margin-bottom:16px;}
        table{width:100%;border-collapse:collapse;font-size:10px;}
        th{background:#111;color:#fff;text-align:left;padding:6px 8px;}
        td{border-bottom:1px solid #ddd;padding:6px 8px;}
        tr:nth-child(even){background:#f7f7f7;}
        .footer{margin-top:16px;font-size:9px;color:#999;}
        @media print { @page { size: landscape; margin: 12mm; } }
      </style></head><body>
      <h1>RSIA Conseil — Export tickets SAV</h1>
      <div class="sub">${ag} — ${periode} — ${data.length} ticket(s) — généré le ${new Date().toLocaleDateString('fr-FR')}</div>
      <table><thead><tr>
        <th>N° Ticket</th><th>Date intervention</th><th>Statut</th><th>Agence</th><th>Client</th><th>Téléphone</th><th>Produit</th><th>Problème</th>
      </tr></thead><tbody>${lignes}</tbody></table>
      <div class="footer">RSIA Conseil — Document généré automatiquement</div>
      </body></html>`;
    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    setTimeout(() => { w.print(); }, 300);
  };

  const updateStatus = async (id, newStatus) => {
    setTickets(prev => prev.map(t => t.id===id?{...t,fields:{...t.fields,Statut:newStatus}}:t));
    await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Tickets SAV/'+id, {
      method:'PATCH', headers:{Authorization:'Bearer '+AIRTABLE_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({fields:{Statut:newStatus}})
    });
  };

  const confirmerAnnulation = async (ticket, motif) => {
    const fields = { Statut: "Annulé", Commentaire: "Annulé : " + motif.trim() };
    const planningId = ticket?.fields?.PlanningID;
    if (planningId) {
      try {
        await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Planning/'+planningId, {
          method:'PATCH', headers:{Authorization:'Bearer '+AIRTABLE_TOKEN,'Content-Type':'application/json'},
          body:JSON.stringify({fields:{Statut:'Libre'}})
        });
      } catch(e) { console.error(e); }
    }
    setTickets(prev => prev.map(t => t.id===ticket.id?{...t,fields:{...t.fields,...fields}}:t));
    await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Tickets SAV/'+ticket.id, {
      method:'PATCH', headers:{Authorization:'Bearer '+AIRTABLE_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({fields})
    });
    setModalAnnulation(null);
  };

  const filtered = tickets.filter(t => {
    const matchAgence = agenceFilter==="global" || t.fields?.Agence===agenceFilter;
    const matchStatut = statutFilter==="tous" || t.fields?.Statut===statutFilter || (!t.fields?.Statut&&statutFilter==="Nouveau");
    const q = search.toLowerCase();
    const matchSearch = !q || (t.fields?.Client||"").toLowerCase().includes(q) || (t.fields?.Name||"").toLowerCase().includes(q) || (t.fields?.Produit||"").toLowerCase().includes(q);
    return matchAgence && matchStatut && matchSearch;
  });

  const sortFn = (a,b) => {
    if (sortBy === "date") return parseDateCreneau(a.fields?.Créneau) - parseDateCreneau(b.fields?.Créneau);
    if (sortBy === "ticket") return (b.fields?.Name||"").localeCompare(a.fields?.Name||"");
    return 0;
  };

  // Vue "Tous" : actifs triés en haut, terminés/annulés triés séparément en bas
  let sorted;
  if (statutFilter === "tous") {
    const actifs = filtered.filter(t => !isStatutClos(t.fields?.Statut));
    const clos = filtered.filter(t => isStatutClos(t.fields?.Statut));
    sorted = [...actifs.sort(sortFn), ...clos.sort(sortFn)];
  } else {
    sorted = [...filtered].sort(sortFn);
  }

  const stats = {
    total: tickets.length,
    urgent: tickets.filter(t => t.fields?.Urgent===true||t.fields?.Urgent==="true").length,
    nouveau: tickets.filter(t => !t.fields?.Statut||t.fields?.Statut==="Nouveau").length,
    encours: tickets.filter(t => t.fields?.Statut==="En cours").length,
    termine: tickets.filter(t => t.fields?.Statut==="Terminé").length,
  };

  const byAgence = {};
  AGENCES.forEach(a => { byAgence[a] = tickets.filter(t => t.fields?.Agence===a).length; });

  return (
    <div style={{minHeight:"100vh",background:C.bg}}>
      {showModalRdv && (
        <ModalRdv
          agenceAccess={agenceFilter !== "global" ? agenceFilter : agenceAccess}
          onClose={() => setShowModalRdv(false)}
          onSuccess={(num) => { setShowModalRdv(false); setSuccessTicket(num); charger(); }}
        />
      )}
      {successTicket && <ModalSuccess ticket={successTicket} onClose={() => setSuccessTicket(null)} />}
      {modalAnnulation && (
        <ModalAnnulation
          ticket={modalAnnulation}
          onClose={() => setModalAnnulation(null)}
          onConfirm={confirmerAnnulation}
        />
      )}

      <div style={{position:"fixed",top:"16px",right:"16px",zIndex:2000,display:"flex",flexDirection:"column",gap:"8px",maxWidth:"320px"}}>
        {notifs.map(n => (
          <div key={n.id} style={{background:C.card,border:"1px solid "+C.orBord,borderLeft:"4px solid "+C.or,borderRadius:"10px",padding:"12px 14px",boxShadow:"0 8px 24px rgba(0,0,0,0.4)",color:C.white,fontSize:"12px",fontWeight:"600"}}>
            {n.texte}
          </div>
        ))}
      </div>

      <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          <div style={{width:"36px",height:"36px",background:C.or,borderRadius:"8px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontFamily:"Arial Black",fontSize:"18px",fontWeight:"900",color:"#111",transform:"scaleX(-1)",display:"inline-block"}}>R</span>
          </div>
          <div>
            <div style={{fontSize:"15px",fontWeight:"900",color:C.white}}>
              <span style={{display:"inline-block",transform:"scaleX(-1)",fontFamily:"Arial Black"}}>R</span>S<span style={{color:C.or}}>IA</span>
              <span style={{fontSize:"11px",fontWeight:"500",marginLeft:"6px",color:C.muted}}>Dashboard SAV</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          {lastRefresh && <span style={{fontSize:"10px",color:C.muted,display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"6px",height:"6px",background:"#22c55e",borderRadius:"50%",display:"inline-block"}}/>MAJ {lastRefresh} · auto</span>}
          <button onClick={() => setShowModalRdv(true)} style={{background:C.or,border:"none",color:"#111",borderRadius:"8px",padding:"8px 16px",fontSize:"12px",fontWeight:"900",cursor:"pointer",display:"flex",alignItems:"center",gap:"6px"}}>📞 + Nouveau RDV</button>
          <button onClick={charger} style={{background:C.orDim,border:"1px solid "+C.orBord,color:C.or,borderRadius:"8px",padding:"6px 14px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>↺</button>
          <div style={{width:"1px",height:"24px",background:C.border,margin:"0 4px"}}/>
          <button onClick={onClose} title="Fermer la session" style={{background:"rgba(220,38,38,0.08)",border:"1px solid rgba(220,38,38,0.25)",color:"rgba(220,38,38,0.85)",borderRadius:"8px",width:"30px",height:"30px",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
        </div>
      </div>

      <div style={{padding:"24px",maxWidth:"1200px",margin:"0 auto"}}>
        {agenceAccess === "global" && (
          <div style={{display:"flex",gap:"8px",marginBottom:"20px",flexWrap:"wrap"}}>
            {["global",...AGENCES].map(a => (
              <button key={a} onClick={() => setAgenceFilter(a)}
                style={{padding:"7px 16px",borderRadius:"20px",border:"1px solid "+(agenceFilter===a?C.or:C.border),background:agenceFilter===a?C.or:"transparent",color:agenceFilter===a?"#111":C.muted,fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>
                {a==="global"?"🌐 Toutes agences":a}
              </button>
            ))}
          </div>
        )}

          <StatCard label="Total tickets" value={stats.total} accent/>

          <StatCard label="Nouveaux" value={stats.nouveau}/>
          <StatCard label="En cours" value={stats.encours}/>
          <StatCard label="Terminés" value={stats.termine}/>
        </div>

        {agenceFilter === "global" && (
          <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"12px",padding:"16px 20px",marginBottom:"20px"}}>
            <div style={{fontSize:"13px",fontWeight:"700",color:C.white,marginBottom:"12px"}}>Répartition par agence</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px"}}>
              {AGENCES.map(a => (
                <button key={a} onClick={() => setAgenceFilter(a)} style={{background:"#1a1a1a",border:"1px solid "+C.border,borderRadius:"10px",padding:"12px",textAlign:"center",cursor:"pointer"}}>
                  <div style={{fontSize:"22px",fontWeight:"900",color:C.or,fontFamily:"monospace"}}>{byAgence[a]}</div>
                  <div style={{fontSize:"11px",color:C.muted,marginTop:"4px"}}>{a}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        <div style={{display:"flex",gap:"4px",marginBottom:"16px",background:C.card,borderRadius:"10px",padding:"4px",border:"1px solid "+C.border,width:"fit-content"}}>
          {[["tickets","🎫 Tickets"],["planning","📅 Planning"]].map(([v,l]) => (
            <button key={v} onClick={() => setVue(v)}
              style={{padding:"7px 18px",borderRadius:"7px",border:"none",background:vue===v?C.or:"transparent",color:vue===v?"#111":C.muted,fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>

        <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:"12px",padding:"14px 16px",marginBottom:"16px"}}>
          <div style={{fontSize:"12px",fontWeight:"700",color:C.white,marginBottom:"10px"}}>📤 Export (respecte les filtres agence/statut/recherche ci-dessous)</div>
          <div style={{display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center"}}>
            <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
              <span style={{fontSize:"11px",color:C.muted}}>Du</span>
              <input type="date" value={exportDebut} onChange={e => setExportDebut(e.target.value)} style={{width:"140px"}}/>
              <span style={{fontSize:"11px",color:C.muted}}>au</span>
              <input type="date" value={exportFin} onChange={e => setExportFin(e.target.value)} style={{width:"140px"}}/>
              {(exportDebut||exportFin) && (
                <button onClick={() => { setExportDebut(""); setExportFin(""); }} style={{background:"none",border:"none",color:C.muted,fontSize:"11px",cursor:"pointer",textDecoration:"underline"}}>Effacer</button>
              )}
            </div>
            <div style={{display:"flex",gap:"8px",marginLeft:"auto"}}>
              <button onClick={exportExcel} style={{background:C.vertDim,border:"1px solid rgba(22,163,74,0.4)",color:C.vert,borderRadius:"8px",padding:"8px 14px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>📊 Excel</button>
              <button onClick={exportPDF} style={{background:C.orDim,border:"1px solid "+C.orBord,color:C.or,borderRadius:"8px",padding:"8px 14px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>🖨️ PDF</button>
            </div>
          </div>
        </div>

        {vue === "tickets" && (
          <>
            <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"16px"}}>
              <div style={{display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center"}}>
                <input placeholder="🔍 Rechercher client, ticket, produit..." value={search} onChange={e => setSearch(e.target.value)} style={{width:"280px"}}/>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                  {["tous","Nouveau","En cours","Terminé","Annulé"].map(s => (
                    <button key={s} onClick={() => setStatutFilter(s)}
                      style={{padding:"6px 12px",borderRadius:"20px",border:"1px solid "+(statutFilter===s?C.or:C.border),background:statutFilter===s?C.orDim:"transparent",color:statutFilter===s?C.or:C.muted,fontSize:"11px",fontWeight:"600",cursor:"pointer"}}>
                      {s==="tous"?"Tous":s}
                    </button>
                  ))}
                </div>
                <span style={{fontSize:"11px",color:C.muted,marginLeft:"auto"}}>{sorted.length} ticket{sorted.length>1?"s":""}</span>
              </div>
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center",background:"#151515",border:"1px solid "+C.border,borderRadius:"10px",padding:"8px 12px"}}>
                <span style={{fontSize:"11px",color:C.muted,fontWeight:"700",marginRight:"2px"}}>Trier :</span>
                {[["date","📅 Date"],["ticket","🔢 N° Ticket"]].map(([v,l]) => (
                  <button key={v} onClick={() => setSortBy(v)}
                    style={{padding:"6px 14px",borderRadius:"20px",border:"1px solid "+(sortBy===v?C.or:C.border),background:sortBy===v?C.orDim:"transparent",color:sortBy===v?C.or:C.muted,fontSize:"11px",fontWeight:"700",cursor:"pointer"}}>
                    {l}
                  </button>
                ))}
                {statutFilter === "tous" && (
                  <span style={{fontSize:"10px",color:C.muted,marginLeft:"auto"}}>Terminés / Annulés repoussés en bas</span>
                )}
              </div>
            </div>
            {loading && <div style={{textAlign:"center",padding:"60px",color:C.muted}}>Chargement...</div>}
            {!loading && sorted.length===0 && (
              <div style={{textAlign:"center",padding:"60px",color:C.muted,border:"1px dashed "+C.border,borderRadius:"12px"}}>Aucun ticket trouvé</div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
              {sorted.map(t => <TicketRow key={t.id} t={t} onStatusChange={updateStatus} onAnnuler={setModalAnnulation} onRenvoyerMail={renvoyerMailTechnicien} onRenvoyerMailClient={renvoyerMailClient}/>)}
            </div>
          </>
        )}

        {vue === "planning" && <PlanningView agenceFilter={agenceFilter}/>}
      </div>
    </div>
  );
}

function Login({ onLogin }) {
  const [pwd, setPwd] = React.useState("");
  const [error, setError] = React.useState(false);
  const [show, setShow] = React.useState(false);
  const tenter = () => {
    const access = PASSWORDS[pwd.trim()];
    if (access) { onLogin(access); }
    else { setError(true); setTimeout(() => setError(false), 2000); }
  };
  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{width:"100%",maxWidth:"380px"}}>
        <div style={{textAlign:"center",marginBottom:"40px"}}>
          <div style={{width:"60px",height:"60px",background:C.or,borderRadius:"14px",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <span style={{fontFamily:"Arial Black",fontSize:"30px",fontWeight:"900",color:"#111",transform:"scaleX(-1)",display:"inline-block"}}>R</span>
          </div>
          <div style={{fontSize:"24px",fontWeight:"900",color:C.white}}>
            <span style={{display:"inline-block",transform:"scaleX(-1)",fontFamily:"Arial Black"}}>R</span>S<span style={{color:C.or}}>IA</span> Conseil
          </div>
          <div style={{fontSize:"12px",color:C.muted,marginTop:"6px",letterSpacing:"2px",textTransform:"uppercase"}}>Dashboard SAV</div>
        </div>
        <div style={{background:C.card,border:"1px solid "+(error?"rgba(220,38,38,0.4)":C.orBord),borderRadius:"16px",padding:"28px"}}>
          <div style={{fontSize:"13px",fontWeight:"700",color:C.white,marginBottom:"16px"}}>Accès sécurisé</div>
          <div style={{position:"relative",marginBottom:"16px"}}>
            <input type={show?"text":"password"} placeholder="Mot de passe agence" value={pwd}
              onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key==="Enter"&&tenter()}/>
            <button onClick={() => setShow(!show)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"14px",width:"auto"}}>
              {show?"🙈":"👁️"}
            </button>
          </div>
          {error && <div style={{fontSize:"11px",color:C.rouge,marginBottom:"12px",textAlign:"center"}}>Mot de passe incorrect</div>}
          <button onClick={tenter} style={{width:"100%",padding:"12px",background:C.or,color:"#111",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:"900",cursor:"pointer"}}>Accéder →</button>
          <div style={{marginTop:"20px",borderTop:"1px solid "+C.border,paddingTop:"16px"}}>
            <div style={{fontSize:"10px",color:C.muted,marginBottom:"8px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px"}}>Accès disponibles</div>
            {[["rsia2026","Toutes agences"],["ibos65","Ibos"],["tarnos40","Tarnos"],["lescar64","Lescar"],["stgaudens31","Saint-Gaudens"]].map(([p,l]) => (
              <div key={p} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid "+C.border}}>
                <span style={{fontSize:"11px",color:C.muted}}>{l}</span>
                <code style={{fontSize:"11px",color:C.or,background:C.orDim,padding:"1px 6px",borderRadius:"4px"}}>{p}</code>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [access, setAccess] = React.useState(null);
  return access ? <Dashboard agenceAccess={access} onClose={() => setAccess(null)}/> : <Login onLogin={setAccess}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
