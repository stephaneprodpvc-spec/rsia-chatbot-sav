function ModalAction({ ticket, onClose, onDone }) {
  const [mode, setMode] = React.useState(null);
  const [commentaire, setCommentaire] = React.useState("");
  const [newDate, setNewDate] = React.useState("");
  const [newCreneau, setNewCreneau] = React.useState("Matin (8h30 — 12h00)");
  const [saving, setSaving] = React.useState(false);
  const today = new Date().toISOString().split('T')[0];

  const confirmer = async () => {
    if (mode === "replanifier" && !newDate) return;
    if (mode === "annuler" && !commentaire.trim()) return;
    setSaving(true);
    try {
      const fields = {};
      if (mode === "terminer") {
        fields.Statut = "Terminé";
        if (commentaire) fields.Commentaire = commentaire;
      } else if (mode === "annuler") {
        fields.Statut = "Annulé";
        fields.Commentaire = "Annulé : " + commentaire;
        const planningId = ticket.fields?.PlanningID;
        if (planningId) {
          await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Planning/'+planningId, {
            method:'PATCH',
            headers:{Authorization:'Bearer '+AIRTABLE_TOKEN,'Content-Type':'application/json'},
            body:JSON.stringify({fields:{Statut:'Libre'}})
          });
        }
      } else {
        fields.Statut = "En cours";
        const dateLabel = new Date(newDate+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
        fields["Créneau"] = newCreneau + ' — ' + dateLabel;
        if (commentaire) fields.Commentaire = "Replanifié : " + commentaire;
      }
      await fetch('https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Tickets%20SAV/'+ticket.id, {
        method:'PATCH',
        headers:{Authorization:'Bearer '+AIRTABLE_TOKEN,'Content-Type':'application/json'},
        body:JSON.stringify({fields})
      });
      onDone(mode);
    } catch(e) { console.error(e); }
    setSaving(false);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal-box">
        <div style={{width:"36px",height:"4px",background:"#333",borderRadius:"2px",margin:"0 auto 20px"}}/>

          <div style={{fontSize:"12px",color:C.muted,marginTop:"3px"}}>{ticket.fields?.Produit} · {ticket.fields?.["Problème"]}</div>
          <div style={{fontSize:"12px",color:C.text,marginTop:"6px"}}>📅 {ticket.fields?.["Créneau"]}</div>
          {ticket.fields?.Adresse && <div style={{fontSize:"12px",color:C.muted,marginTop:"2px"}}>📍 {ticket.fields?.Adresse}</div>}
        </div>
        {!mode && (
          <>
            <div style={{fontSize:"12px",color:C.muted,marginBottom:"12px",textAlign:"center"}}>Que souhaitez-vous faire ?</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
              <button onClick={() => setMode("terminer")}
                style={{padding:"20px 16px",background:C.vertDim,border:"2px solid rgba(22,163,74,0.4)",borderRadius:"14px",color:C.vert,cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:"28px",marginBottom:"6px"}}>✅</div>
                <div style={{fontSize:"13px",fontWeight:"900"}}>SAV terminé</div>
                <div style={{fontSize:"10px",color:"rgba(22,163,74,0.7)",marginTop:"3px"}}>Intervention réalisée</div>
              </button>
              <button onClick={() => setMode("replanifier")}
                style={{padding:"20px 16px",background:C.jauneDim,border:"2px solid rgba(217,119,6,0.4)",borderRadius:"14px",color:C.jaune,cursor:"pointer",textAlign:"center"}}>

            </div>
            <div style={{marginBottom:"14px"}}>

              {saving ? "⏳ Enregistrement..." : "❌ Confirmer l'annulation"}
            </button>

        )}
        {mode === "replanifier" && (
          <>
            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}}>
              <button onClick={() => setMode(null)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"18px"}}>←</button>
              <span style={{fontSize:"14px",fontWeight:"700",color:C.white}}>🔄 Replanifier l'intervention</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
              <div>
                <label style={{fontSize:"11px",color:C.muted,display:"block",marginBottom:"6px",fontWeight:"700"}}>Nouvelle date *</label>
                <input type="date" value={newDate} min={today} onChange={e => setNewDate(e.target.value)}/>

                <label style={{fontSize:"11px",color:C.muted,display:"block",marginBottom:"6px",fontWeight:"700"}}>Créneau *</label>
                <select value={newCreneau} onChange={e => setNewCreneau(e.target.value)}>

                  <option value="Après-midi (13h00 — 17h00)">🌇 Après-midi</option>
                </select>

            </div>
            <div style={{marginBottom:"14px"}}>
              <label style={{fontSize:"11px",color:C.muted,display:"block",marginBottom:"6px",fontWeight:"700"}}>Motif *</label>
              <textarea rows={2} placeholder="Ex : Client absent, pièce à commander..."
                value={commentaire} onChange={e => setCommentaire(e.target.value)} style={{resize:"none"}}/>
            </div>
            <button onClick={confirmer} disabled={saving||!newDate}
              style={{width:"100%",padding:"14px",background:saving||!newDate?"#333":C.jaune,color:"#111",border:"none",borderRadius:"12px",fontSize:"14px",fontWeight:"900",cursor:saving||!newDate?"not-allowed":"pointer"}}>
              {saving ? "⏳ Enregistrement..." : "🔄 Confirmer la replanification"}

      </div>

  );
}

const MOIS = {janvier:1,février:2,mars:3,avril:4,mai:5,juin:6,juillet:7,août:8,septembre:9,octobre:10,novembre:11,décembre:12};
const parseDateCreneau = (creneau) => {
  if (!creneau) return null;
  const match = creneau.match(/(\d+)\s+(\w+)(?:\s+(\d{4}))?/g);
  if (!match) return null;
  const last = match[match.length-1];
  const parts = last.match(/(\d+)\s+(\w+)(?:\s+(\d{4}))?/);
  if (!parts) return null;
  const day = parseInt(parts[1]);
  const month = MOIS[parts[2].toLowerCase()];
  if (!month) return null;
  const year = parts[3] ? parseInt(parts[3]) : new Date().getFullYear();
  return new Date(year, month-1, day);
};

function Technicien({ agence, onClose }) {
  const [tickets, setTickets] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [onglet, setOnglet] = React.useState("aujourd_hui");
  const [selectedTicket, setSelectedTicket] = React.useState(null);
  const [lastRefresh, setLastRefresh] = React.useState(null);

  const charger = async () => {
    setLoading(true);
    try {
      const filter = encodeURIComponent('{Agence}="'+agence+'"');
      const url = 'https://api.airtable.com/v0/'+AIRTABLE_BASE+'/Tickets%20SAV?filterByFormula='+filter+'&sort[0][field]=Name&sort[0][direction]=desc&maxRecords=100';
      const r = await fetch(url, { headers: { Authorization: 'Bearer '+AIRTABLE_TOKEN } });
      const json = await r.json();
      setTickets(json.records||[]);
      setLastRefresh(new Date().toLocaleTimeString('fr-FR'));
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  React.useEffect(() => { charger(); }, [agence]);

  const todayStr = new Date().toLocaleDateString('fr-FR');
  const todayLong = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  const filtrer = (t) => {
    const creneau = (t.fields?.["Créneau"] || "").toLowerCase();
    const statut = t.fields?.Statut || "Nouveau";
    if (onglet === "aujourd_hui") return (creneau.includes(todayStr) || creneau.includes(todayLong.toLowerCase())) && statut !== "Terminé" && statut !== "Annulé";
    if (onglet === "a_venir") return statut !== "Terminé" && statut !== "Annulé";
    if (onglet === "termines") return statut === "Terminé";
    if (onglet === "annules") return statut === "Annulé";
    return true;
  };

  const filtered = tickets.filter(filtrer);
  const nbAujourdhui = tickets.filter(t => { const c=(t.fields?.["Créneau"]||"").toLowerCase(); return c.includes(todayStr)||c.includes(todayLong.toLowerCase()); }).length;
  const nbAVenir = tickets.filter(t => { const s=t.fields?.Statut||"Nouveau"; return s!=="Terminé"&&s!=="Annulé"; }).length;
  const nbTermines = tickets.filter(t => t.fields?.Statut==="Terminé").length;
  const nbAnnules = tickets.filter(t => t.fields?.Statut==="Annulé").length;
  const agenceShort = agence.replace(/ \(\d+\)/,"");

  const imprimerSemaine = () => {
    const now = new Date();
    const jourSemaine = now.getDay();
    const decalageLundi = jourSemaine === 0 ? -6 : 1 - jourSemaine;
    const lundi = new Date(now); lundi.setDate(now.getDate() + decalageLundi); lundi.setHours(0,0,0,0);
    const dimanche = new Date(lundi); dimanche.setDate(lundi.getDate() + 6); dimanche.setHours(23,59,59,999);

    const semaine = tickets
      .filter(t => t.fields?.Statut !== "Annulé")
      .map(t => ({ t, date: parseDateCreneau(t.fields?.["Créneau"]) }))
      .filter(x => x.date && x.date >= lundi && x.date <= dimanche)
      .sort((a,b) => a.date - b.date);

    const fmtJour = (d) => d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
    const lignes = semaine.map(({t}) => `
      <tr>
        <td>${t.fields?.["Créneau"]||""}</td>
        <td>${t.fields?.Name||""}</td>
        <td>${t.fields?.Client||""}</td>
        <td>${t.fields?.Adresse||""}</td>
        <td>${t.fields?.["Téléphone"]||""}</td>
        <td>${t.fields?.Produit||""} — ${t.fields?.["Problème"]||""}</td>
      </tr>`).join("");
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Ma semaine — ${agenceShort}</title>
      <style>
        body{font-family:Arial,sans-serif;padding:24px;color:#111;}
        h1{font-size:18px;margin-bottom:2px;}
        .sub{color:#666;font-size:11px;margin-bottom:16px;}
        table{width:100%;border-collapse:collapse;font-size:10px;}
        th{background:#111;color:#fff;text-align:left;padding:6px 8px;}
        td{border-bottom:1px solid #ddd;padding:6px 8px;vertical-align:top;}
        tr:nth-child(even){background:#f7f7f7;}
        .footer{margin-top:16px;font-size:9px;color:#999;}
        @media print { @page { size: landscape; margin: 12mm; } }
      </style></head><body>
      <h1>RSIA Conseil — Planning technicien</h1>
      <div class="sub">${agenceShort} — Semaine du ${fmtJour(lundi)} au ${fmtJour(dimanche)} — ${semaine.length} intervention(s)</div>
      <table><thead><tr>
        <th>Créneau</th><th>N° Ticket</th><th>Client</th><th>Adresse</th><th>Téléphone</th><th>Produit / Problème</th>
      </tr></thead><tbody>${lignes || '<tr><td colspan="6" style="text-align:center;color:#999;">Aucune intervention cette semaine</td></tr>'}</tbody></table>
      <div class="footer">RSIA Conseil — Document généré automatiquement</div>
      </body></html>`;
    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    setTimeout(() => { w.print(); }, 300);
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg,maxWidth:"600px",margin:"0 auto"}}>
      {selectedTicket && (
        <ModalAction ticket={selectedTicket} onClose={() => setSelectedTicket(null)} onDone={() => { setSelectedTicket(null); charger(); }}/>
      )}
      <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"14px 20px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
            <div style={{width:"38px",height:"38px",background:C.or,borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontFamily:"Arial Black",fontSize:"19px",fontWeight:"900",color:"#111",transform:"scaleX(-1)",display:"inline-block"}}>R</span>
            </div>
            <div>
              <div style={{fontSize:"14px",fontWeight:"900",color:C.white}}>
                <span style={{display:"inline-block",transform:"scaleX(-1)",fontFamily:"Arial Black"}}>R</span>S<span style={{color:C.or}}>IA</span>
                <span style={{fontSize:"11px",fontWeight:"600",marginLeft:"6px",color:C.muted}}>Technicien</span>
              </div>
              <div style={{fontSize:"11px",color:C.or,marginTop:"1px",fontWeight:"700"}}>📍 {agenceShort}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <button onClick={charger} title="Rafraîchir" style={{background:C.orDim,border:"1px solid "+C.orBord,color:C.or,borderRadius:"8px",width:"30px",height:"30px",fontSize:"13px",fontWeight:"700",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↺</button>
            <button onClick={imprimerSemaine} title="Imprimer ma semaine" style={{background:C.orDim,border:"1px solid "+C.orBord,color:C.or,borderRadius:"8px",padding:"0 12px",height:"30px",fontSize:"11px",fontWeight:"700",cursor:"pointer",display:"flex",alignItems:"center",gap:"5px",whiteSpace:"nowrap",flexShrink:0}}>🖨️ Ma semaine</button>
            <div style={{width:"1px",height:"22px",background:C.border,margin:"0 2px",flexShrink:0}}/>
            <button onClick={onClose} title="Fermer la session" style={{background:"rgba(220,38,38,0.08)",border:"1px solid rgba(220,38,38,0.25)",color:"rgba(220,38,38,0.85)",borderRadius:"8px",width:"30px",height:"30px",cursor:"pointer",fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
          </div>
        </div>
        <div style={{display:"flex",gap:"4px",marginTop:"12px",background:"#111",borderRadius:"10px",padding:"3px"}}>
          {[["aujourd_hui","Aujourd'hui",nbAujourdhui],["a_venir","À venir",nbAVenir],["termines","Terminés",nbTermines],["annules","Annulés",nbAnnules]].map(([id,label,count]) => (
            <button key={id} onClick={() => setOnglet(id)}
              style={{flex:1,padding:"7px 4px",borderRadius:"8px",border:"none",background:onglet===id?C.or:"transparent",color:onglet===id?"#111":C.muted,fontSize:"11px",fontWeight:"700",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"4px"}}>
              {label}
              {count>0 && <span style={{background:onglet===id?"rgba(0,0,0,0.2)":C.orDim,color:onglet===id?"#111":C.or,borderRadius:"10px",padding:"0 5px",fontSize:"10px"}}>{count}</span>}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:"16px"}}>
        {loading && <div style={{textAlign:"center",padding:"60px",color:C.muted}}>Chargement...</div>}
        {!loading && filtered.length===0 && (
          <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
            <div style={{fontSize:"40px",marginBottom:"12px"}}>{onglet==="aujourd_hui"?"🎉":onglet==="termines"?"📋":onglet==="annules"?"🚫":"📭"}</div>
            <div style={{fontSize:"14px",fontWeight:"700",color:C.text}}>
              {onglet==="aujourd_hui"?"Aucune intervention aujourd'hui":onglet==="termines"?"Aucune intervention terminée":onglet==="annules"?"Aucune intervention annulée":"Aucune intervention à venir"}
            </div>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
          {filtered.map(t => <TicketCard key={t.id} ticket={t} onAction={setSelectedTicket}/>)}
        </div>
        {lastRefresh && <div style={{textAlign:"center",fontSize:"9px",color:C.muted,marginTop:"20px"}}>Dernière mise à jour : {lastRefresh}</div>}
      </div>
    </div>
  );
}

function Login({ onLogin }) {
  const [pwd, setPwd] = React.useState("");
  const [error, setError] = React.useState(false);
  const [show, setShow] = React.useState(false);

  const tenter = () => {
    const agence = PASSWORDS[pwd.trim()];
    if (agence) { onLogin(agence); }
    else { setError(true); setTimeout(() => setError(false), 2000); }
  };

  return (
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{width:"100%",maxWidth:"340px"}}>
        <div style={{textAlign:"center",marginBottom:"36px"}}>
          <div style={{width:"64px",height:"64px",background:C.or,borderRadius:"16px",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 8px 32px rgba(255,107,0,0.3)"}}>
            <span style={{fontFamily:"Arial Black",fontSize:"32px",fontWeight:"900",color:"#111",transform:"scaleX(-1)",display:"inline-block"}}>R</span>
          </div>
          <div style={{fontSize:"22px",fontWeight:"900",color:C.white}}>
            <span style={{display:"inline-block",transform:"scaleX(-1)",fontFamily:"Arial Black"}}>R</span>S<span style={{color:C.or}}>IA</span> Conseil
          </div>
          <div style={{fontSize:"11px",color:C.muted,marginTop:"6px",letterSpacing:"2px",textTransform:"uppercase"}}>Espace Technicien</div>
        </div>
        <div style={{background:C.card,border:"1px solid "+(error?"rgba(220,38,38,0.4)":C.orBord),borderRadius:"16px",padding:"24px"}}>
          <div style={{position:"relative",marginBottom:"14px"}}>
            <input type={show?"text":"password"} placeholder="Code agence" value={pwd}
              onChange={e => setPwd(e.target.value)} onKeyDown={e => e.key==="Enter"&&tenter()}
              style={{paddingRight:"40px",fontSize:"16px",textAlign:"center",letterSpacing:"2px"}}/>
            <button onClick={() => setShow(!show)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:"16px",width:"auto",padding:"0"}}>
              {show?"🙈":"👁️"}
            </button>
          </div>
          {error && <div style={{fontSize:"11px",color:C.rouge,marginBottom:"10px",textAlign:"center"}}>Code incorrect</div>}
          <button onClick={tenter} style={{width:"100%",padding:"14px",background:C.or,color:"#111",border:"none",borderRadius:"10px",fontSize:"14px",fontWeight:"900",cursor:"pointer"}}>
            Accéder →
          </button>
        </div>
        <div style={{marginTop:"20px",background:C.card,border:"1px solid "+C.border,borderRadius:"12px",padding:"16px"}}>
          <div style={{fontSize:"10px",color:C.muted,marginBottom:"10px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"1px",textAlign:"center"}}>Codes d'accès</div>
          {[["ibos65","Ibos (65)"],["tarnos40","Tarnos (40)"],["lescar64","Lescar (64)"],["stgaudens31","Saint-Gaudens (31)"]].map(([p,l]) => (
            <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+C.border}}>
              <span style={{fontSize:"12px",color:C.muted}}>{l}</span>
              <code style={{fontSize:"12px",color:C.or,background:C.orDim,padding:"2px 8px",borderRadius:"6px",cursor:"pointer"}} onClick={() => setPwd(p)}>{p}</code>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [agence, setAgence] = React.useState(null);
  return agence ? <Technicien agence={agence} onClose={() => setAgence(null)}/> : <Login onLogin={setAgence}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
